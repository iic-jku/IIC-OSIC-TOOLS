# Explicit DNS config for build steps (buildkit sandbox does not always
# inherit the host/container DNS settings reliably)
[dns]
  nameservers = ["140.78.161.2", "8.8.8.8", "1.1.1.1"]
  searchDomains = ["iic.jku.at"]

[worker.oci]
  # limit the number of parallel build steps that can run at the same time
  max-parallelism = 6
  gc = true
  gckeepstorage = 60000
  [[worker.oci.gcpolicy]]
    all = false
    keepBytes = 40960000000
    # keep the cache for 4 weeks
    keepDuration = 2419200
    filters = [ "type==source.local", "type==exec.cachemount", "type==source.git.checkout"]
  [[worker.oci.gcpolicy]]
    all = false
    # keep for 4*3 weeks
    keepDuration = 7257600
    keepBytes = 51200000000
  [[worker.oci.gcpolicy]]
    all = false
    keepBytes = 51200000000
  [[worker.oci.gcpolicy]]
    all = true
    keepBytes = 51200000000

[registry."registry.iic.jku.at:5000"]
  http = true
